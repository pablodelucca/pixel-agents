services:
  app:
    container_name: clawmpany
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_PRIVY_APP_ID=${VITE_PRIVY_APP_ID}
        - VITE_API_URL=${VITE_API_URL:-https://api.clawmpany.id}
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - FRONTEND_URL=${FRONTEND_URL:-https://clawmpany.id}
      # Database (PocketBase — will be replaced with Supabase)
      - POCKETBASE_URL=${POCKETBASE_URL:-http://localhost:8090}
      - POCKETBASE_ADMIN_EMAIL=${POCKETBASE_ADMIN_EMAIL:-admin@example.com}
      - POCKETBASE_ADMIN_PASSWORD=${POCKETBASE_ADMIN_PASSWORD:-admin123}
      # Payment - USDC
      - PAYMENT_RECIPIENT_ADDRESS=${PAYMENT_RECIPIENT_ADDRESS}
      # Payment - Tripay
      - TRIPAY_API_KEY=${TRIPAY_API_KEY}
      - TRIPAY_PRIVATE_KEY=${TRIPAY_PRIVATE_KEY}
      - TRIPAY_MERCHANT_CODE=${TRIPAY_MERCHANT_CODE}
      - TRIPAY_API_URL=${TRIPAY_API_URL:-https://tripay.co.id/api/transaction/create}
    restart: unless-stopped
