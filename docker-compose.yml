version: '3.8'

services:
  pixel-agents:
    build: .
    ports:
      - "3000:3000"
    volumes:
      # Mount Claude projects directory (read-only)
      - ~/.claude/projects:/root/.claude/projects:ro
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped

